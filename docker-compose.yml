version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: inplast_aponta_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inplast_apontamento
      POSTGRES_USER: inplast
      POSTGRES_PASSWORD: Inplast@2026#Aponta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inplast -d inplast_apontamento"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: inplast_aponta_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4001:80"
    environment:
      APP_NAME: InplastApontamento
      APP_ENV: production
      APP_URL: http://aponta.inplast.local:4001
      APP_DEBUG: "false"
      APP_KEY: base64:Gk8Xh2Jm3LpN9qR5vW7yZ1cB4nA6dE0fH8jK3mP2sT0uV1x=
      
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: inplast_apontamento
      DB_USERNAME: inplast
      DB_PASSWORD: Inplast@2026#Aponta
      
      SANCTUM_STATEFUL_DOMAINS: aponta.inplast.local:4001
      
      CORS_ALLOWED_ORIGINS: http://aponta.inplast.local:4001
      
      SANkHYA_ENABLED: "false"
      SANkHYA_URL: https://api.sankhya.com.br
      
      N8N_ENABLED: "false"
      N8N_URL: http://n8n:5678
      
      JWT_SECRET: inplast-jwt-secret-key-2026-aponta-producao
      
      PHP_UPLOAD_MAX_FILESIZE: 20M
      PHP_POST_MAX_SIZE: 20M
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache

volumes:
  postgres_data: